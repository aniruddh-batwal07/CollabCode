services:
  postgres:
    image: postgres:16

    container_name: realtime-editor-postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: realtime_editor

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: realtime-editor-redis

    restart: always

    ports:
      - "6379:6379"

volumes:
  postgres_data: